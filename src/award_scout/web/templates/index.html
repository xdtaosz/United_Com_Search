<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Award Scout</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #333; }
  .container { max-width: 640px; margin: 40px auto; padding: 20px; }
  .header { background: #1a237e; color: #fff; padding: 24px; border-radius: 8px 8px 0 0; text-align: center; }
  .header h1 { font-size: 24px; margin-bottom: 4px; }
  .header p { opacity: .8; font-size: 14px; }
  .form-box { background: #fff; padding: 24px; border-radius: 0 0 8px 8px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
  .row { display: flex; gap: 12px; margin-bottom: 16px; }
  .col { flex: 1; }
  label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 4px; }
  input, select { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
  input:focus, select:focus { outline: none; border-color: #1a237e; box-shadow: 0 0 0 2px rgba(26,35,126,.15); }
  button { width: 100%; padding: 14px; background: #1a237e; color: #fff; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; }
  button:hover { background: #283593; }
  .spinner { display: none; text-align: center; padding: 24px; }
  .spinner.active { display: block; }
  .spinner div { display: inline-block; width: 40px; height: 40px; border: 4px solid #e0e0e0; border-top-color: #1a237e; border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hint { font-size: 12px; color: #999; margin-top: 4px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Award Scout</h1>
    <p>US Airline Award Miles Search</p>
  </div>
  <div class="form-box">
    <form id="searchForm" action="/search" method="post">
      <div class="row">
        <div class="col">
          <label>Origin</label>
          <input name="origin" value="SFO" required placeholder="SFO">
        </div>
        <div class="col">
          <label>Destination</label>
          <input name="destination" value="BJS" required placeholder="BJS">
        </div>
      </div>
      <div class="row">
        <div class="col">
          <label>Start Date</label>
          <input name="start_date" type="date" value="{{ default_start }}" required>
        </div>
        <div class="col">
          <label>End Date</label>
          <input name="end_date" type="date" value="{{ default_end }}" required>
        </div>
      </div>
      <div class="row">
        <div class="col">
          <label>Cabin</label>
          <select name="cabin">
            {% for val, label in cabins %}
            <option value="{{ val }}" {% if val == 'business' %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col">
          <label>Max Miles</label>
          <input name="max_miles" type="number" value="110000" min="0" step="1000">
        </div>
      </div>
      <div class="row">
        <div class="col">
          <label>Exclude Airports (comma-separated)</label>
          <input name="exclude_airports" value="MNL" placeholder="MNL,HND">
          <div class="hint">Flights transiting through these airports will be filtered out</div>
        </div>
      </div>
      <button type="submit">Search Awards</button>
    </form>
    <div class="spinner" id="spinner"><div></div><p style="margin-top:12px;color:#888;">Searching... this may take a minute</p></div>
  </div>
</div>
<script>
  document.getElementById('searchForm').addEventListener('submit', function() {
    document.getElementById('spinner').classList.add('active');
    this.querySelector('button').disabled = true;
  });
</script>
</body>
</html>
