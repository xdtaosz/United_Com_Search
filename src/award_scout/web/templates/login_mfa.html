<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MFA — Award Scout</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #333; }
  .container { max-width: 440px; margin: 60px auto; padding: 20px; }
  .header { background: #e65100; color: #fff; padding: 24px; border-radius: 8px 8px 0 0; text-align: center; }
  .header h1 { font-size: 20px; }
  .form-box { background: #fff; padding: 24px; border-radius: 0 0 8px 8px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
  label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 4px; }
  input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; text-align: center; letter-spacing: 4px; }
  input:focus { outline: none; border-color: #e65100; box-shadow: 0 0 0 2px rgba(230,81,0,.15); }
  button { width: 100%; padding: 14px; background: #e65100; color: #fff; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 16px; }
  button:hover { background: #bf360c; }
  .error { background: #ffebee; color: #c62828; padding: 10px; border-radius: 6px; margin-bottom: 12px; font-size: 13px; }
  .info { color: #666; font-size: 13px; margin-top: 16px; text-align: center; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Verification Required</h1>
    <p style="opacity:.8;font-size:13px;">Enter the code from your phone/email</p>
  </div>
  <div class="form-box">
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form action="/mfa-submit" method="post">
      <input type="hidden" name="login_id" value="{{ login_id }}">
      <input type="hidden" name="params_json" value='{{ params_json | safe }}'>
      <label>Verification Code</label>
      <input name="mfa_code" type="text" required placeholder="000000" maxlength="8" autofocus>
      <button type="submit">Verify & Continue</button>
    </form>
    <p class="info">Check your phone or email for the 6-digit code</p>
  </div>
</div>
</body>
</html>
