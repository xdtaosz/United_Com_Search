<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login — Award Scout</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #333; }
  .container { max-width: 440px; margin: 60px auto; padding: 20px; }
  .header { background: #1a237e; color: #fff; padding: 24px; border-radius: 8px 8px 0 0; text-align: center; }
  .header h1 { font-size: 20px; }
  .form-box { background: #fff; padding: 24px; border-radius: 0 0 8px 8px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
  label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 4px; margin-top: 12px; }
  input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
  input:focus { outline: none; border-color: #1a237e; box-shadow: 0 0 0 2px rgba(26,35,126,.15); }
  button { width: 100%; padding: 14px; background: #1a237e; color: #fff; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 20px; }
  button:hover { background: #283593; }
  .error { background: #ffebee; color: #c62828; padding: 10px; border-radius: 6px; margin-bottom: 12px; font-size: 13px; }
  .info { color: #666; font-size: 13px; margin-top: 16px; text-align: center; }
  .spinner { display: none; text-align: center; padding: 12px; }
  .spinner.active { display: block; }
  .spinner div { display: inline-block; width: 24px; height: 24px; border: 3px solid #e0e0e0; border-top-color: #1a237e; border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>United Login</h1>
    <p style="opacity:.8;font-size:13px;">Enter your MileagePlus credentials</p>
  </div>
  <div class="form-box">
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form id="loginForm" action="/login-submit" method="post">
      <input type="hidden" name="login_id" value="{{ login_id }}">
      <input type="hidden" name="params_json" value='{{ params_json | safe }}'>
      <label>MileagePlus Number</label>
      <input name="mp_number" value="{{ mp_number }}" required placeholder="HLX69604">
      <label>Password</label>
      <input name="password" type="password" required placeholder="Password">
      <button type="submit">Sign In</button>
    </form>
    <div class="spinner" id="spinner"><div></div><p style="color:#888;font-size:12px;">Logging in...</p></div>
    <p class="info">Credentials are sent directly to United. Nothing is stored.</p>
  </div>
</div>
<script>
  document.getElementById('loginForm').addEventListener('submit', function() {
    document.getElementById('spinner').classList.add('active');
    this.querySelector('button').disabled = true;
  });
</script>
</body>
</html>
